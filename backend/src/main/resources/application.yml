server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/soccer_dashboard?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: localhost
      port: 6379
  sql:
    init:
      mode: always

app:
  jwt:
    secret: soccer-dashboard-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
    expiration-ms: 86400000
  football-data:
    api-key: ${FOOTBALL_DATA_API_KEY:}
    base-url: https://api.football-data.org/v4
  gnews:
    api-key: ${GNEWS_API_KEY:}
  claude:
    api-key: ${CLAUDE_API_KEY:}
  polling:
    live-interval-ms: 30000
    idle-interval-ms: 300000

management:
  endpoints:
    web:
      exposure:
        include: health,info
