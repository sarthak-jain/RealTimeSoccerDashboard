spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate

app:
  jwt:
    secret: ${JWT_SECRET}
  football-data:
    api-key: ${FOOTBALL_DATA_API_KEY}
  cors:
    allowed-origins: ${CORS_ORIGINS:https://soccer-dashboard.example.com}
