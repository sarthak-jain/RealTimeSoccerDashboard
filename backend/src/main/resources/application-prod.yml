spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
  jpa:
    hibernate:
      ddl-auto: update
  sql:
    init:
      mode: always

app:
  jwt:
    secret: ${JWT_SECRET}
  football-data:
    api-key: ${FOOTBALL_DATA_API_KEY:}
  gnews:
    api-key: ${GNEWS_API_KEY:}
  claude:
    api-key: ${CLAUDE_API_KEY:}
  cors:
    allowed-origins: ${CORS_ORIGINS:*}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  metrics:
    export:
      statsd:
        enabled: true
        host: ${DD_AGENT_HOST:localhost}
        port: 8125
        flavor: datadog
