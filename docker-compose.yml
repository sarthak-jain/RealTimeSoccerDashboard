version: '3.8'

services:
  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    container_name: dd-agent
    environment:
      DD_API_KEY: ${DD_API_KEY}
      DD_SITE: ${DD_SITE:-us5.datadoghq.com}
      DD_ENV: ${DD_ENV:-dev}
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_DOGSTATSD_NON_LOCAL_TRAFFIC: "true"
      DD_LOGS_ENABLED: "true"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "true"
      DD_CONTAINER_EXCLUDE: "name:dd-agent"
      DD_TAGS: "project:soccer-dashboard"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      - ./datadog/conf.d/mysql.d:/etc/datadog-agent/conf.d/mysql.d:ro
      - ./datadog/conf.d/redis.d:/etc/datadog-agent/conf.d/redis.d:ro
    ports:
      - "8126:8126"
      - "8125:8125/udp"

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: soccer_dashboard
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./data/init-datadog-user.sql:/docker-entrypoint-initdb.d/init-datadog-user.sql:ro
    labels:
      com.datadoghq.ad.check_names: '["mysql"]'
      com.datadoghq.ad.init_configs: '[{}]'
      com.datadoghq.ad.instances: '[{"host":"%%host%%","port":3306,"username":"datadog","password":"datadog"}]'
      com.datadoghq.tags.env: ${DD_ENV:-dev}
      com.datadoghq.tags.service: soccer-dashboard-mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    labels:
      com.datadoghq.ad.check_names: '["redisdb"]'
      com.datadoghq.ad.init_configs: '[{}]'
      com.datadoghq.ad.instances: '[{"host":"%%host%%","port":6379}]'
      com.datadoghq.tags.env: ${DD_ENV:-dev}
      com.datadoghq.tags.service: soccer-dashboard-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/soccer_dashboard?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY:-}
      DD_AGENT_HOST: datadog-agent
      DD_SERVICE: soccer-dashboard-backend
      DD_ENV: ${DD_ENV:-dev}
      DD_VERSION: "1.0.0"
      DD_LOGS_INJECTION: "true"
    labels:
      com.datadoghq.tags.env: ${DD_ENV:-dev}
      com.datadoghq.tags.service: soccer-dashboard-backend
      com.datadoghq.tags.version: "1.0.0"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    labels:
      com.datadoghq.tags.env: ${DD_ENV:-dev}
      com.datadoghq.tags.service: soccer-dashboard-frontend
      com.datadoghq.tags.version: "1.0.0"
    depends_on:
      - backend

volumes:
  mysql_data:
